name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://lihztkriauzpviyulljx.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder_for_ci
          NEXT_PUBLIC_HOUSE_EDGE: '0.01'
          HOUSE_EDGE: '0.01'
